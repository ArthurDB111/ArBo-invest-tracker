services:
  - type: web
    name: portfolio-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_HOURS
        value: "720"
      - key: USERS_JSON
        value: "[]"
      - key: ALLOWED_ORIGINS
        value: "*"
